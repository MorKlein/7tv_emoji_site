<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Смайлики</title>

  <style>
    :root {
      --bg: #f5f5f5;
      --card-bg: #ffffff;
      --border: #d8d8d8;
      --text: #1f1f1f;
      --muted: #666666;
      --accent: #2c6bed;
      --accent-hover: #1f57c4;
      --overlay: rgba(15, 20, 30, 0.55);
      --secondary-bg: #e8e8e8;
      --secondary-hover: #dcdcdc;
      --input-bg: #ffffff;
      --dropzone-bg: #fafafa;
      --dropzone-active: #eef4ff;
      --danger: #d93025;
    }

    body.dark-theme {
      --bg: #121826;
      --card-bg: #1b2435;
      --border: #32405c;
      --text: #eef3ff;
      --muted: #a5b2cb;
      --accent: #6ea8ff;
      --accent-hover: #8bb9ff;
      --overlay: rgba(4, 10, 20, 0.72);
      --secondary-bg: #2a354d;
      --secondary-hover: #364462;
      --input-bg: #111827;
      --dropzone-bg: #162033;
      --dropzone-active: #1d2d4a;
      --danger: #ff7b72;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      padding: 20px;
      background: var(--bg);
      color: var(--text);
    }

    .toolbar {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      margin-bottom: 20px;
    }

    button,
    input[type="text"] {
      font: inherit;
    }

    button {
      border: none;
      border-radius: 8px;
      padding: 10px 16px;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.2s ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.6;
      transform: none;
    }

    .primary-btn {
      background: var(--accent);
      color: #ffffff;
    }

    .primary-btn:hover {
      background: var(--accent-hover);
    }

    .secondary-btn {
      background: var(--secondary-bg);
      color: var(--text);
    }

    .secondary-btn:hover {
      background: var(--secondary-hover);
    }

    .theme-toggle {
      min-width: 46px;
      padding: 10px 12px;
      font-size: 18px;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 15px;
    }

    .gallery-status {
      grid-column: 1 / -1;
      text-align: center;
      color: var(--muted);
      padding: 24px 12px;
    }

    .card {
      background: var(--card-bg);
      padding: 10px;
      border-radius: 10px;
      text-align: center;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
    }

    .card img,
    .card video {
      display: block;
      width: 100%;
      max-width: 100%;
      border-radius: 5px;
    }

    .card audio {
      width: 100%;
      margin-top: 8px;
    }

    .card p {
      margin: 10px 0 0;
      word-break: break-word;
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: var(--overlay);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 1000;
    }

    .modal-overlay.open {
      display: flex;
    }

    .modal {
      width: min(100%, 440px);
      background: var(--card-bg);
      border-radius: 14px;
      padding: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
    }

    .modal h2 {
      margin: 0 0 16px;
      font-size: 22px;
    }

    .dropzone {
      border: 2px dashed var(--border);
      border-radius: 12px;
      padding: 28px 20px;
      text-align: center;
      color: var(--muted);
      background: var(--dropzone-bg);
      transition: border-color 0.2s ease, background 0.2s ease;
    }

    .dropzone.dragover {
      border-color: var(--accent);
      background: var(--dropzone-active);
      color: var(--text);
    }

    .dropzone p {
      margin: 0 0 12px;
    }

    .dropzone button {
      margin-top: 4px;
    }

    .hidden-input {
      display: none;
    }

    .field {
      margin-top: 16px;
    }

    .field label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
    }

    .field input[type="text"] {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      background: var(--input-bg);
      color: var(--text);
    }

    .field input[type="text"].invalid {
      border-color: var(--danger);
      box-shadow: 0 0 0 1px var(--danger);
    }

    .field-error {
      margin-top: 8px;
      min-height: 18px;
      font-size: 13px;
      color: var(--danger);
    }

    .selected-file {
      margin-top: 12px;
      font-size: 14px;
      color: var(--muted);
      min-height: 20px;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 20px;
    }
  </style>
</head>
<body>

  <div class="toolbar">
    <button class="secondary-btn theme-toggle" id="themeToggleBtn" type="button" aria-label="Сменить тему">☀</button>
    <button class="primary-btn" id="openUploadModalBtn">Добавить изображение</button>
  </div>

  <div class="gallery" id="gallery"></div>

  <div class="modal-overlay" id="uploadModal">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="uploadModalTitle">
      <h2 id="uploadModalTitle">Добавить изображение</h2>

      <div class="dropzone" id="dropzone">
        <p>Перетащите изображение сюда</p>
        <p>или</p>
        <button type="button" class="secondary-btn" id="chooseFileBtn">Выбрать из Проводника</button>
        <input class="hidden-input" type="file" id="fileInput" accept="image/*,video/*,audio/*">
        <div class="selected-file" id="selectedFileName">Файл пока не выбран</div>
      </div>

      <div class="field">
        <label for="imgName">Название файла</label>
        <input id="imgName" type="text" placeholder="Например, smile_file">
        <div class="field-error" id="imgNameError"></div>
      </div>

      <div class="modal-actions">
        <button type="button" class="secondary-btn" id="cancelUploadBtn">Отмена</button>
        <button type="button" class="primary-btn" id="confirmUploadBtn">Готово</button>
      </div>
    </div>
  </div>

  <script>
    const API_ENDPOINT = "/upload";
    const gallery = document.getElementById("gallery");
    const uploadModal = document.getElementById("uploadModal");
    const openUploadModalBtn = document.getElementById("openUploadModalBtn");
    const cancelUploadBtn = document.getElementById("cancelUploadBtn");
    const confirmUploadBtn = document.getElementById("confirmUploadBtn");
    const themeToggleBtn = document.getElementById("themeToggleBtn");
    const chooseFileBtn = document.getElementById("chooseFileBtn");
    const fileInput = document.getElementById("fileInput");
    const dropzone = document.getElementById("dropzone");
    const imgNameInput = document.getElementById("imgName");
    const imgNameError = document.getElementById("imgNameError");
    const selectedFileName = document.getElementById("selectedFileName");

    let selectedFile = null;
    let apiAvailable = true;
    const themeStorageKey = "gallery-theme";
    const validFileNamePattern = /^[A-Za-z_]+$/;

    const mediaExtensions = {
      image: [".jpg", ".jpeg", ".png", ".gif", ".webp", ".svg", ".bmp", ".avif"],
      video: [".mp4", ".webm", ".ogv", ".mov"],
      audio: [".mp3", ".wav", ".ogg", ".m4a", ".aac", ".flac"]
    };

    loadMediaFiles();
    applyTheme(localStorage.getItem(themeStorageKey) === "dark" ? "dark" : "light");
    confirmUploadBtn.disabled = true;

    function setGalleryStatus(message) {
      gallery.innerHTML = `<div class="gallery-status">${message}</div>`;
    }

    function setApiUnavailable(message) {
      apiAvailable = false;
      openUploadModalBtn.disabled = true;
      openUploadModalBtn.title = message;
    }

    function setApiAvailable() {
      apiAvailable = true;
      openUploadModalBtn.disabled = false;
      openUploadModalBtn.title = "";
    }

    function applyTheme(theme) {
      const isDark = theme === "dark";
      document.body.classList.toggle("dark-theme", isDark);
      themeToggleBtn.textContent = isDark ? "☾" : "☀";
      themeToggleBtn.setAttribute("aria-label", isDark ? "Включить светлую тему" : "Включить тёмную тему");
      localStorage.setItem(themeStorageKey, theme);
    }

    function validateFileName() {
      const value = imgNameInput.value.trim();
      const isValid = validFileNamePattern.test(value);

      imgNameInput.classList.toggle("invalid", value.length > 0 && !isValid);
      imgNameError.textContent = value.length > 0 && !isValid
        ? "Допустимы только английские буквы и подчёркивания."
        : "";
      confirmUploadBtn.disabled = !selectedFile || !isValid || !apiAvailable;

      return isValid;
    }

    async function readApiResponse(response) {
      const text = await response.text();

      if (!text) {
        return {};
      }

      try {
        return JSON.parse(text);
      } catch {
        return { error: text };
      }
    }

    async function loadMediaFiles() {
      setGalleryStatus("Загрузка медиафайлов...");

      try {
        const response = await fetch(API_ENDPOINT);
        const data = await readApiResponse(response);

        if (!response.ok) {
          throw new Error(data.error || `HTTP ${response.status}`);
        }

        if (!data || !Array.isArray(data.files)) {
          throw new Error("Неожиданный ответ API.");
        }

        setApiAvailable();

        if (data.files.length === 0) {
          setGalleryStatus("Папка с медиафайлами пока пуста.");
          return;
        }

        gallery.innerHTML = "";

        data.files.forEach(file => {
          createCard(file.url, file.name, file.mediaType);
        });
      } catch (error) {
        console.log("Ошибка загрузки:", error);
        setApiUnavailable(error.message);
        setGalleryStatus(`Ошибка загрузки: ${error.message}`);
      }
    }

    function getDisplayName(name) {
      return name.replace(/\.[^.]+$/, "");
    }

    function isSupportedMediaFile(file) {
      if (file.type.startsWith("image/") || file.type.startsWith("video/") || file.type.startsWith("audio/")) {
        return true;
      }

      return Boolean(getMediaType(file.name));
    }

    function getMediaType(name) {
      const lowerName = name.toLowerCase();

      if (mediaExtensions.image.some(ext => lowerName.endsWith(ext))) {
        return "image";
      }

      if (mediaExtensions.video.some(ext => lowerName.endsWith(ext))) {
        return "video";
      }

      if (mediaExtensions.audio.some(ext => lowerName.endsWith(ext))) {
        return "audio";
      }

      return null;
    }

    function createCard(url, name, mediaType) {
      const card = document.createElement("div");
      card.className = "card";

      let mediaElement;

      if (mediaType === "image") {
        mediaElement = document.createElement("img");
        mediaElement.src = url;
        mediaElement.alt = name;
      } else if (mediaType === "video") {
        mediaElement = document.createElement("video");
        mediaElement.src = url;
        mediaElement.controls = true;
        mediaElement.preload = "metadata";
      } else if (mediaType === "audio") {
        mediaElement = document.createElement("audio");
        mediaElement.src = url;
        mediaElement.controls = true;
        mediaElement.preload = "metadata";
      }

      const title = document.createElement("p");
      title.textContent = getDisplayName(name);

      card.appendChild(mediaElement);
      card.appendChild(title);
      gallery.appendChild(card);
    }

    function openUploadModal() {
      if (!apiAvailable) {
        alert("API загрузки пока недоступен.");
        return;
      }

      uploadModal.classList.add("open");
    }

    function closeUploadModal() {
      uploadModal.classList.remove("open");
      fileInput.value = "";
      selectedFile = null;
      imgNameInput.value = "";
      imgNameInput.classList.remove("invalid");
      imgNameError.textContent = "";
      selectedFileName.textContent = "Файл пока не выбран";
      dropzone.classList.remove("dragover");
      confirmUploadBtn.disabled = true;
    }

    function setSelectedFile(file) {
      if (!file) {
        return;
      }

      if (!isSupportedMediaFile(file)) {
        alert("Можно загружать только изображения, видео или аудио.");
        return;
      }

      selectedFile = file;
      imgNameInput.value = file.name.replace(/\.[^.]+$/, "").replace(/[^A-Za-z_]/g, "");
      selectedFileName.textContent = `Выбран файл: ${file.name}`;
      validateFileName();
    }

    openUploadModalBtn.addEventListener("click", openUploadModal);
    cancelUploadBtn.addEventListener("click", closeUploadModal);
    confirmUploadBtn.addEventListener("click", uploadToGitHub);
    themeToggleBtn.addEventListener("click", () => {
      applyTheme(document.body.classList.contains("dark-theme") ? "light" : "dark");
    });
    chooseFileBtn.addEventListener("click", () => fileInput.click());
    fileInput.addEventListener("change", event => {
      setSelectedFile(event.target.files[0]);
    });
    imgNameInput.addEventListener("input", validateFileName);

    uploadModal.addEventListener("click", event => {
      if (event.target === uploadModal) {
        closeUploadModal();
      }
    });

    ["dragenter", "dragover"].forEach(eventName => {
      dropzone.addEventListener(eventName, event => {
        event.preventDefault();
        dropzone.classList.add("dragover");
      });
    });

    ["dragleave", "drop"].forEach(eventName => {
      dropzone.addEventListener(eventName, event => {
        event.preventDefault();
        dropzone.classList.remove("dragover");
      });
    });

    dropzone.addEventListener("drop", event => {
      const file = event.dataTransfer.files[0];
      setSelectedFile(file);
    });

    async function uploadToGitHub() {
      const name = imgNameInput.value.trim();

      if (!apiAvailable) {
        alert("API загрузки недоступен.");
        return;
      }

      if (!selectedFile || !name) {
        alert("Выберите файл и укажите его название.");
        return;
      }

      if (!validateFileName()) {
        alert("Название файла должно содержать только английские буквы и подчёркивания.");
        return;
      }

      confirmUploadBtn.disabled = true;

      try {
        const formData = new FormData();
        formData.append("name", name);
        formData.append("file", selectedFile, selectedFile.name);

        const response = await fetch(API_ENDPOINT, {
          method: "POST",
          body: formData
        });
        const data = await readApiResponse(response);

        if (!response.ok) {
          throw new Error(data.error || "Ошибка загрузки.");
        }

        alert("Файл загружен на GitHub.");
        closeUploadModal();
        await loadMediaFiles();
      } catch (error) {
        console.log("Ошибка загрузки:", error);
        alert(error.message || "Не удалось загрузить файл.");
        validateFileName();
      }
    }
  </script>

</body>
</html>
